# Сообщения плагина (для игроков)
messages: 
  # Сообщение, которое будет высвечиваться, когда игрок введет запрещенную команду
  blockedcommand: '&7&l(&c&l!&7&l) &3Команда &8(&4/%cmd%&8) &3не доступна с вашим уровнем доступа'
  # Сообщение, которое будет высвечиваться, когда игрок введет запрещенный символ в команде, чате и на табличке
  blockedsymbol: '&7&l(&c&l!&7&l) &3Нельзя использовать &8(&4%symbol%&8) &3в командах'
  blockedsignsymbol: '&7&l(&c&l!&7&l) &3Нельзя использовать &8(&4%symbol%&8) &3на табличке'
  blockedchatsymbol: '&7&l(&c&l!&7&l) &cВаше сообщение содержит запрещенные символы'
  blockedbooksymbol: '&7&l(&c&l!&7&l) &cВ книге нельзя писать символы, которых нет на клавиатуре'
  # Сообщение, которое будет высвечиваться, когда игрок введет запрещенный символ
  blockedword: '&7&l(&c&l!&7&l) &3Нельзя использовать слово &4%word%'
  # Сообщение которое будет высвечиваться при попытке написать команду через :
  blocksyntax: '&7&l(&c&l!&7&l) &cКоманды с двоеточием запрещены!'
  # Сообщение при превышении лимитов
  maxnumbers: '&7&l(&c&l!&7&l) &eМаксимальное кол-во цифр в сообщении &a%limit%'

# Оповещения плагина (для админов)
notify:
  blockedcommand: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cиспользовал запрещеннную команду &8(&4/%cmd%&8)'
  blockedsymbol: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cиспользовал запрещенный символ &8(&4%symbol%&8)'
  blockedsignsymbol: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cиспользовал запрещенный символ на табличке &8(&4%symbol%&8)'
  blockedchatsymbol: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cиспользовал запрещеннный символ в чате &8(&4%chatsymbol%&8)'
  blockedbooksymbol: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cпытался написать запрещенные символы в книге.'
  blockedword: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cиспользовал запрещенное слово &8(&4%word%&8)'
  blocksyntax: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cпопытался использовать команду с двоеточием &8(&4%cmd%&8)'
  maxnumbers: '&7&l(&c&l!&7&l) &cИгрок &3%player% &cиспользовал более %limit% цифр в сообщении &8(&4%msg%&8)'
  
# Сообщения-тайтлы
# Тайтл:субтайтл:время появления:время показа:время скрытия
titles:
  blockedcommand: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fКоманда %cmd% заблокирована!:10:50:15'
  blockedsymbol: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fСимвол %symbol% заблокирован!:10:50:15'
  blockedsignsymbol: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fСимвол %symbol% заблокирован!:10:50:15'
  blockedchatsymbol: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fВы использовали запрещенные символы!:10:50:15'
  blockedbooksymbol: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fВы использовали запрещенные символы!:10:50:15'
  blockedword: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fСлово %word% заблокировано!:10:50:15'
  blocksyntax: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fКоманды с двоеточием запрещены!:10:50:15'
  maxnumbers: '&7&l(&c&l!&7&l) &6&lОшибка &7&l(&c&l!&7&l):&fСлишком много чисел в сообщении!:10:50:15'